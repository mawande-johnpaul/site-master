<!-- modal -->
@if (isOpen()) {
  <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" (click)="close()">
    <div
      class="bg-white dark:bg-slate-900 text-gray-900 dark:text-white rounded-xl shadow-2xl w-full max-w-md p-4 max-h-[90vh] overflow-y-auto"
      (click)="$event.stopPropagation()"
    >
      <ng-container
        [ngComponentOutlet]="activeModal()"
        [ngComponentOutletEnvironmentInjector]="environmentInjector"
      ></ng-container>
    </div>
  </div>
}
