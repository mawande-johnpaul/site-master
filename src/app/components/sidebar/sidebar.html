<aside
  class="w-64 shrink-0 bg-slate-900 dark:bg-black border-r border-slate-200 dark:border-slate-800 flex flex-col fixed h-full"
>
  <div class="p-6 flex flex-col h-full">
    <!-- Brand -->
    <div class="flex items-center gap-3 mb-10">
      <div class="bg-primary rounded-lg size-10 flex items-center justify-center text-white">
        <span class="material-symbols-outlined">rocket_launch</span>
      </div>
      <div class="flex flex-col">
        <h1 class="text-white text-base font-bold leading-none">Professional Engine</h1>
        <p class="text-slate-400 text-[10px] uppercase tracking-widest mt-1">Recruiter Portal</p>
      </div>
    </div>
    <!-- Nav Items -->
    <nav class="flex flex-col gap-2 grow">
      <a
        routerLink="/0/dashboard"
        routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-2 rounded-xl transition-all text-slate-400 hover:text-white hover:bg-white/10"
        ariaCurrentWhenActive="page"
      >
        <span class="material-symbols-outlined">dashboard</span>
        <span class="text-sm font-medium">Dashboard</span>
      </a>
      <a
        routerLink="/0/internships"
        routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-2 rounded-xl transition-all text-slate-400 hover:text-white hover:bg-white/10"
        ariaCurrentWhenActive="page"
      >
        <span class="material-symbols-outlined">work</span>
        <span class="text-sm font-medium">Internships</span>
      </a>
      <a
        routerLink="/0/documents"
        routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-2 rounded-xl transition-all text-slate-400 hover:text-white hover:bg-white/10"
        ariaCurrentWhenActive="page"
      >
        <span class="material-symbols-outlined">description</span>
        <span class="text-sm font-medium">Documents</span>
      </a>
      <a
        routerLink="/0/profile"
        routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-2 rounded-xl transition-all text-slate-400 hover:text-white hover:bg-white/10"
        ariaCurrentWhenActive="page"
      >
        <span class="material-symbols-outlined">person</span>
        <span class="text-sm font-medium">Profile</span>
      </a>
      <div class="mt-auto">
        <a
          routerLink="/0/settings"
          routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-3 px-3 py-2 rounded-xl transition-all text-slate-400 hover:text-white hover:bg-white/10"
          ariaCurrentWhenActive="page"
        >
          <span class="material-symbols-outlined">settings</span>
          <span class="text-sm font-medium">Settings</span>
        </a>
      </div>
    </nav>
  </div>
</aside>
